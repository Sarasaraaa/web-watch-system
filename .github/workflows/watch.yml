# GitHub Actions のワークフロー名
name: Web Watch System

# ワークフローを実行するタイミング
on:
  # 定期実行の設定
  schedule:
    # 毎日 UTC 1:00 に実行
    # 日本時間では毎日 10:00
    - cron: '0 1 * * *' 
  # GitHub Actions 画面から手動実行できるようにする
  workflow_dispatch:

# このワークフローに付与する権限
permissions:
  # 変更ファイルをリポジトリへ commit / push するために write 権限が必要
  contents: write

jobs:
  watch:
    # GitHub が用意する Ubuntu 環境で実行
    runs-on: ubuntu-latest

    steps:
      # リポジトリの内容を実行環境へ取得
      - uses: actions/checkout@v5

      # Webページを確認し、変更があればRSS XMLと前回データを更新する
      - name: Run Web Watch
        run: |
          # 前回取得したページ本文を保存するディレクトリ
          mkdir -p data
          # RSS XMLを出力するディレクトリ
          mkdir -p docs

          # Pythonスクリプトをこの場で実行
          python3 << 'PY'
          import urllib.request
          import re
          import html
          import os
          import hashlib
          import json
          from datetime import datetime, timezone

          # 監視対象の一覧を読み込む
          # config/targets.json に id, name, url を定義しておく想定
          with open('config/targets.json', 'r', encoding='utf-8') as f:
              targets = json.load(f)

          # 監視対象ごとに処理する
          for target in targets:
              target_id = target['id']
              name = target['name']
              url = target['url']

              print(f'Checking: {name}')

              try:
                  # Webサイトによっては User-Agent がないと拒否されるため指定する
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "Mozilla/5.0"}
                  )

                  # 対象URLからHTMLを取得する
                  with urllib.request.urlopen(req, timeout=30) as res:
                      raw = res.read().decode('utf-8', errors='ignore')

                  # scriptタグを除去
                  text = re.sub(r'<script[\s\S]*?</script>', '', raw, flags=re.I)
                  # styleタグを除去
                  text = re.sub(r'<style[\s\S]*?</style>', '', text, flags=re.I)
                  # HTMLタグを改行に置換
                  text = re.sub(r'<[^>]+>', '\n', text)
                  # &amp; などのHTMLエンティティを通常文字へ戻す
                  text = html.unescape(text)
                  # 空行を整理
                  text = re.sub(r'\n\s*\n+', '\n', text)
                  # 連続するスペースやタブを1つに整理
                  text = re.sub(r'[ \t]+', ' ', text)
                  # 前後の空白を削除
                  text = text.strip()

                  # 前回取得した本文の保存先
                  previous_path = f'data/{target_id}_previous.txt'
                  # RSS XMLの出力先
                  rss_path = f'docs/{target_id}.xml'

                  # 前回の本文を読み込む
                  old = ''
                  if os.path.exists(previous_path):
                      with open(previous_path, 'r', encoding='utf-8') as f:
                          old = f.read()

                  # 今回取得した本文と前回本文を比較する
                  changed = text != old

                  if changed:
                      # RSSのpubDate用に現在時刻をUTC形式で作成
                      now = datetime.now(timezone.utc).strftime('%a, %d %b %Y %H:%M:%S GMT')
                      # 本文のハッシュ値を作成し、変更内容の識別子に使う
                      digest = hashlib.sha256(text.encode('utf-8')).hexdigest()[:12]

                      # RSSのdescriptionに入れる要約(500文字に設定)
                      summary = text[:500]
                      # XML内で壊れないように特殊文字をエスケープ
                      summary = summary.replace('&', '&amp;')
                      summary = summary.replace('<', '&lt;')
                      summary = summary.replace('>', '&gt;')

                      # RSS XMLを生成
                      rss = f'''<?xml version="1.0" encoding="UTF-8" ?>
          <rss version="2.0">
            <channel>
              <title>{name}</title>
              <link>{url}</link>
              <description>{name} updates</description>

              <item>
                <title>{name} changed {digest}</title>
                <link>{url}</link>
                <guid>{digest}</guid>
                <pubDate>{now}</pubDate>
                <description>{summary}</description>
              </item>

            </channel>
          </rss>
          '''

                      # RSS XMLを書き出す
                      with open(rss_path, 'w', encoding='utf-8') as f:
                          f.write(rss)

                      # 今回取得した本文を次回比較用に保存
                      with open(previous_path, 'w', encoding='utf-8') as f:
                          f.write(text)

                      print(f'Changed: {name}')
                  else:
                      # 前回と同じ内容なら何も更新しない
                      print(f'No change: {name}')

              except Exception as e:
                  # 取得失敗やJSON不備などがあっても、他の対象の処理は継続する
                  print(f'Error: {name}')
                  print(e)

          PY

      # 変更されたファイルをGitHubリポジトリへ反映する
      - name: Commit changes
        run: |
          # GitHub Actions が commit するためのユーザー情報
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 変更されたファイルをすべてステージング
          git add .

          # commit対象の差分がなければ何もしない
          if git diff --cached --quiet; then
            echo "No changes"
          else
            差分があればcommitしてpush
            git commit -m "Update web watch"
            git push
          fi
