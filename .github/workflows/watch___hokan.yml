# ============================================================
# GitHub Actions のワークフロー名
# ============================================================
name: Web Watch System

# ============================================================
# ワークフロー実行タイミング
# ============================================================
on:

  # 定期実行
  schedule:

    # GitHub Actions は UTC で指定する
    # 毎日 JST 09:00 頃
    #
    # cron の形式：
    # ┌───────────── 分 (0 - 59)
    # │ ┌─────────── 時 (0 - 23)
    # │ │ ┌───────── 日 (1 - 31)
    # │ │ │ ┌─────── 月 (1 - 12)
    # │ │ │ │ ┌───── 曜日 (0 - 6)
    # │ │ │ │ │
    # │ │ │ │ │
    # * * * * *

    - cron: '30 22 * * *'

  # GitHub画面から手動実行
  workflow_dispatch:

# ============================================================
# GitHubへpushするための権限
# ============================================================
permissions:

  contents: write

# ============================================================
# 実行ジョブ
# ============================================================
jobs:

  watch:

    # GitHub が提供する Ubuntu 環境を利用
    runs-on: ubuntu-latest

    steps:

      # リポジトリ取得
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Python実行環境
      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      # Pythonスクリプト実行
      - name: Run Web Watch

        run: |

          python scripts/web_watch.py

      # GitHubへ反映
      - name: Commit changes

        run: |

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then

            echo "No repository changes"

          else

            git commit -m "Update web watch results"

            git push

          fi