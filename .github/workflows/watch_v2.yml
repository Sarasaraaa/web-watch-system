name: Web Watch System v2

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: Python をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Web 監視スクリプトを実行
        run: python scripts/web_watch.py

      - name: 生成ファイルをコミット
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data docs

          if git diff --cached --quiet; then
            echo "変更はありません"
          else
            git commit -m "Update web watch results"
            git push
          fi
